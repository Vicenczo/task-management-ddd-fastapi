# ============================================================
# Nginx reverse proxy configuration for production
# ============================================================
# Handles:
#   - HTTP → HTTPS redirect
#   - TLS termination
#   - Proxying to Gunicorn/Uvicorn app
#   - Security headers
#   - Rate limiting
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting: 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream: the FastAPI app container
    upstream taskapi {
        server app:8000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options           DENY always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Client body size limit (for file uploads if added later)
        client_max_body_size 10M;

        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://taskapi;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Health check endpoint — no rate limiting
        location /health {
            proxy_pass http://taskapi/health;
        }
    }
}