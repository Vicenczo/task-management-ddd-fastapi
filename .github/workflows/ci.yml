# ============================================================
# GitHub Actions CI Pipeline - FIXED for PGVector
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  POSTGRES_USER: taskapi
  POSTGRES_PASSWORD: taskapi_secret
  POSTGRES_DB: taskapi_db
  TEST_DB_NAME: taskapi_test_db

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        # Zamenjeno sa imidžom koji podržava vektore za Llama 3
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: taskapi
          POSTGRES_PASSWORD: taskapi_secret
          POSTGRES_DB: taskapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskapi -d taskapi_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: taskapi_secret
        run: |
          # Prvo kreiramo ekstenziju u glavnoj bazi pre migracija
          psql -h localhost -U taskapi -d taskapi_db -c "CREATE EXTENSION IF NOT EXISTS vector;"
          # Kreiramo test bazu za pytest
          psql -h localhost -U taskapi -d taskapi_db -c "CREATE DATABASE taskapi_test_db;"
          # Dodajemo ekstenziju i u test bazu
          psql -h localhost -U taskapi -d taskapi_test_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DEBUG=false
          API_V1_PREFIX=/api/v1
          DB_URL=postgresql+asyncpg://taskapi:taskapi_secret@localhost:5432/taskapi_db
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=ci_secret_key_must_be_at_least_32_characters_long
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          REFRESH_TOKEN_EXPIRE_DAYS=7
          ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:8000"]
          EOF

      - name: Run Alembic migrations
        env:
          DB_URL: postgresql+asyncpg://taskapi:taskapi_secret@localhost:5432/taskapi_db
        run: |
          alembic upgrade head

      - name: Run pytest
        env:
          TEST_DB_URL: postgresql+asyncpg://taskapi:taskapi_secret@localhost:5432/taskapi_test_db
        run: |
          python -m pytest test/ -v --tb=short --no-header

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: |
            .pytest_cache/
          retention-days: 7