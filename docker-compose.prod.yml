# ============================================================
# docker-compose.prod.yml — Production deployment
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requirements:
#   - .env file with production values (see .env.example)
#   - Dockerfile.prod must be built first or pulled from registry
#
# Differences from docker-compose.yml (dev):
#   - Uses Dockerfile.prod (multi-stage, no reload)
#   - Gunicorn instead of uvicorn --reload
#   - No volume mount for live code reload
#   - Resource limits defined
#   - No 'profiles' — all services always start
#   - Nginx reverse proxy added
# ============================================================

version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: taskapi_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Do NOT expose 5432 to host in production
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: taskapi_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: taskapi_app_prod
    restart: always
    env_file:
      - .env
    environment:
      # Override DB_URL to use internal Docker network hostname
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run Alembic migrations before starting Gunicorn
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn app.main:app --config gunicorn.conf.py
      "
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - external

  nginx:
    image: nginx:alpine
    container_name: taskapi_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - external

networks:
  internal:
    driver: bridge
    internal: true   # No direct internet access for DB/Redis
  external:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod: